<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚖️ 模拟法庭训练智能体</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{
    --navy:#1a2238; --navy-light:#2a3553; --gold:#c8a951; --gold-soft:#e0c97a;
    --cream:#f5f1e8; --cream-dark:#ebe4d4; --ink:#23242a; --muted:#6b6f76;
    --user:#2a3553; --bot:#ffffff; --line:#d8cfb8; --danger:#b5483d; --ok:#3c7a52;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--cream);color:var(--ink);display:flex;flex-direction:column;height:100vh;
  }
  h1,h2,h3,.serif{font-family:Georgia,"Songti SC","SimSun",serif}

  /* ---------- 顶栏 ---------- */
  header{
    background:linear-gradient(135deg,var(--navy),var(--navy-light));
    color:var(--cream);padding:12px 20px;display:flex;align-items:center;gap:12px;
    border-bottom:3px solid var(--gold);box-shadow:0 2px 10px rgba(0,0,0,.15);z-index:10;
  }
  header .logo{font-size:24px}
  header h1{font-size:19px;letter-spacing:1px;color:var(--gold-soft)}
  header .status{margin-left:auto;font-size:12px;color:#b8c0d0;display:flex;gap:14px;flex-wrap:wrap}
  header .status b{color:var(--gold-soft)}
  header button{
    background:transparent;border:1px solid var(--gold);color:var(--gold-soft);
    padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:.2s
  }
  header button:hover{background:var(--gold);color:var(--navy)}

  /* ---------- 主区 ---------- */
  main{flex:1;display:flex;overflow:hidden}
  #chat{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #messages{flex:1;overflow-y:auto;padding:24px 18px;scroll-behavior:smooth}
  .wrap{max-width:840px;margin:0 auto}

  /* ---------- 欢迎/设置卡 ---------- */
  .setup{background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px;
    margin:0 auto 18px;max-width:840px;box-shadow:0 4px 18px rgba(26,34,56,.06)}
  .setup .gavel{text-align:center;font-size:40px;margin-bottom:6px}
  .setup h2{text-align:center;color:var(--navy);font-size:22px;margin-bottom:4px}
  .setup .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:22px}
  .group{margin-bottom:20px}
  .group>label{display:block;font-weight:700;color:var(--navy);margin-bottom:10px;font-size:14px}
  .group>label .n{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;
    background:var(--gold);color:var(--navy);border-radius:50%;font-size:12px;margin-right:8px;font-weight:800}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .card{border:2px solid var(--line);border-radius:10px;padding:13px 14px;cursor:pointer;
    transition:.18s;background:var(--cream);position:relative}
  .card:hover{border-color:var(--gold-soft);transform:translateY(-2px)}
  .card.on{border-color:var(--gold);background:#fffdf5;box-shadow:0 4px 12px rgba(200,169,81,.22)}
  .card.on::after{content:"✓";position:absolute;top:8px;right:10px;color:var(--gold);font-weight:800}
  .card .t{font-weight:700;color:var(--navy);font-size:15px;margin-bottom:3px}
  .card .d{font-size:12px;color:var(--muted);line-height:1.5}
  .card .warn{color:var(--danger)}
  .startbtn{display:block;width:100%;margin-top:8px;padding:14px;border:none;border-radius:10px;
    background:linear-gradient(135deg,var(--navy),var(--navy-light));color:var(--gold-soft);
    font-size:16px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:.2s;font-family:Georgia,serif}
  .startbtn:hover{box-shadow:0 6px 18px rgba(26,34,56,.3)}
  .startbtn:disabled{opacity:.5;cursor:not-allowed}

  /* ---------- 消息气泡 ---------- */
  .msg{display:flex;margin-bottom:18px;gap:10px}
  .msg .avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
    justify-content:center;font-size:18px;border:2px solid var(--line)}
  .msg.user{flex-direction:row-reverse}
  .msg.user .avatar{background:var(--navy);border-color:var(--navy)}
  .msg.bot .avatar{background:var(--gold);border-color:var(--gold-soft)}
  .bubble{max-width:78%;padding:13px 16px;border-radius:14px;line-height:1.72;font-size:14.5px;
    box-shadow:0 2px 8px rgba(26,34,56,.05)}
  .msg.user .bubble{background:var(--user);color:#f4f1e8;border-bottom-right-radius:4px}
  .msg.bot .bubble{background:var(--bot);border:1px solid var(--line);border-bottom-left-radius:4px}
  .bubble h2,.bubble h3,.bubble h4{font-family:Georgia,"Songti SC",serif;color:var(--navy);
    margin:12px 0 7px;line-height:1.4}
  .bubble h2{font-size:18px;border-bottom:2px solid var(--gold);padding-bottom:4px}
  .bubble h3{font-size:16px}
  .bubble p{margin:7px 0}
  .bubble ul,.bubble ol{margin:7px 0 7px 20px}
  .bubble li{margin:3px 0}
  .bubble strong{color:var(--navy)}
  .bubble blockquote{border-left:4px solid var(--gold);background:#fbf8ef;padding:8px 14px;
    margin:9px 0;border-radius:0 8px 8px 0;color:#4a4030}
  .bubble table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px}
  .bubble th,.bubble td{border:1px solid var(--line);padding:7px 9px;text-align:left}
  .bubble th{background:var(--navy);color:var(--gold-soft)}
  .bubble tr:nth-child(even){background:var(--cream)}
  .bubble code{background:var(--cream-dark);padding:1px 5px;border-radius:4px;font-size:13px}
  .role-tag{display:inline-block;background:var(--navy);color:var(--gold-soft);font-size:12px;
    padding:1px 9px;border-radius:5px;margin-bottom:6px;font-weight:700}
  .verdict{border-radius:8px;padding:9px 13px;margin:9px 0;font-size:13.5px;font-weight:600}
  .verdict.ok{background:#eaf5ee;border-left:4px solid var(--ok);color:#27613c}
  .verdict.partial{background:#fdf6e3;border-left:4px solid var(--gold);color:#8a6d1b}
  .verdict.no{background:#fbecea;border-left:4px solid var(--danger);color:#963429}
  .cursor::after{content:"▋";color:var(--gold);animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  /* ---------- 雷达图 ---------- */
  .radar-wrap{background:#fffdf5;border:1px solid var(--gold-soft);border-radius:12px;
    padding:16px;margin:12px 0;text-align:center}
  .radar-wrap h4{color:var(--navy);margin-bottom:8px}
  .radar-legend{display:flex;flex-wrap:wrap;gap:8px 16px;justify-content:center;margin-top:10px;font-size:12px}
  .radar-legend span b{color:var(--gold);font-size:14px}

  /* ---------- 输入区 ---------- */
  footer{border-top:1px solid var(--line);background:#fff;padding:12px 16px}
  .inrow{max-width:840px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
  textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:10px;padding:11px 13px;
    font-size:14.5px;font-family:inherit;max-height:140px;line-height:1.5;background:var(--cream)}
  textarea:focus{outline:none;border-color:var(--gold)}
  .sendbtn{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:var(--gold-soft);
    border:none;border-radius:10px;padding:11px 20px;cursor:pointer;font-weight:700;font-size:14px;transition:.2s;white-space:nowrap}
  .sendbtn:hover{box-shadow:0 4px 12px rgba(26,34,56,.25)}
  .sendbtn:disabled{opacity:.45;cursor:not-allowed}
  .toolbar{max-width:840px;margin:0 auto 8px;display:flex;gap:8px;flex-wrap:wrap}
  .toolbar button{background:var(--cream-dark);border:1px solid var(--line);color:var(--navy);
    font-size:12px;padding:5px 11px;border-radius:14px;cursor:pointer;transition:.2s}
  .toolbar button:hover{background:var(--gold);border-color:var(--gold)}

  /* ---------- 弹窗(API Key) ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(26,34,56,.55);display:none;align-items:center;
    justify-content:center;z-index:50;backdrop-filter:blur(2px)}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:14px;padding:26px;max-width:460px;width:92%;
    box-shadow:0 12px 40px rgba(0,0,0,.3);border-top:4px solid var(--gold)}
  .modal h3{color:var(--navy);margin-bottom:6px;font-size:19px}
  .modal p{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6}
  .modal label{display:block;font-size:13px;font-weight:700;color:var(--navy);margin:12px 0 5px}
  .modal input,.modal select{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  .modal .row{display:flex;gap:10px;margin-top:18px}
  .modal .row button{flex:1;padding:11px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px}
  .modal .save{background:var(--navy);color:var(--gold-soft)}
  .modal .cancel{background:var(--cream-dark);color:var(--navy)}
  .modal .hint{font-size:11.5px;color:var(--muted);margin-top:8px}
  .modal a{color:var(--gold);text-decoration:none}
  .modal .keyrow{position:relative}
  .modal .keyrow button{position:absolute;right:6px;top:6px;background:none;border:none;cursor:pointer;font-size:14px;padding:4px}
  .disclaimer{text-align:center;font-size:11px;color:var(--muted);padding:6px}
</style>
</head>
<body>

<header>
  <span class="logo">⚖️</span>
  <h1>模拟法庭训练智能体</h1>
  <div class="status" id="statusBar"></div>
  <button id="cfgBtn">⚙ 设置</button>
  <button id="resetBtn">↻ 新庭审</button>
</header>

<main>
  <div id="chat">
    <div id="messages"><div class="wrap" id="msgList"></div></div>
    <footer>
      <div class="toolbar" id="toolbar" style="display:none">
        <button data-q="请给出最终分析">📊 请求最终分析</button>
        <button data-q="我需要一点提示，应该从哪些角度思考？">💡 给我提示</button>
        <button data-q="请解释相关法条的适用">📖 解释适用法条</button>
        <button data-q="请检索并引证 1-3 个与本案相似的经典案例或最高法指导性/典型案例，说明案例名称、裁判要旨、与本案的异同及借鉴意义。">📚 经典案例引证</button>
      </div>
      <div class="inrow">
        <textarea id="input" rows="1" placeholder="以律师身份输入你的代理意见 / 应对策略…（Enter 发送，Shift+Enter 换行）" disabled></textarea>
        <button class="sendbtn" id="sendBtn" disabled>发送</button>
      </div>
      <div class="disclaimer">⚖️ 本工具仅供教学训练，所有分析不构成正式法律意见。真实案件请咨询持证律师。</div>
    </footer>
  </div>
</main>

<!-- API Key 弹窗 -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>⚙ 配置 Claude API Key</h3>
    <p>本应用在你的浏览器本地直接调用 Claude API，<b>Key 仅保存在你本机</b>（localStorage），不会上传到任何服务器。</p>
    <label>Claude API Key</label>
    <div class="keyrow">
      <input type="password" id="apiKey" placeholder="sk-ant-api03-...">
      <button id="toggleKey" title="显示/隐藏">👁</button>
    </div>
    <div class="hint">没有 Key？前往 <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a> 免费注册并创建。</div>
    <label>模型（影响智能程度与成本）</label>
    <select id="model">
      <option value="claude-opus-4-8">Claude Opus 4.8 — 最强（推荐，成本较高）</option>
      <option value="claude-sonnet-4-6">Claude Sonnet 4.6 — 均衡</option>
      <option value="claude-haiku-4-5">Claude Haiku 4.5 — 快速经济</option>
    </select>
    <div class="row">
      <button class="cancel" id="cfgCancel">取消</button>
      <button class="save" id="cfgSave">保存</button>
    </div>
  </div>
</div>

<script>
/* ============ 系统提示词（与 CLAUDE.md 一致的模拟法庭导师设定） ============ */
const SYSTEM_PROMPT = `你是一个模拟法庭训练智能体，同时扮演三类角色（按训练需要切换）：案件当事人（原告/被告）、对方律师、法官。你还需对学生（律师角色）的法律意见进行合理性判断（合理/部分合理/不合理）并说明理由。核心使命：通过中国民事案件模拟训练，培养法学生的专业技能、表达能力和应对能力。

【两种模式】
出题模式：根据案件类型和难度自行设计完整案情（事实、争议焦点、证据线索），扮演原告或被告陈述诉求/事实，要求学生以律师身份给出代理意见或应诉方案；学生每次发言后给出合理性判断；训练结束时输出结构化案件分析+表现评分。
咨询模式：学生提出具体案件问题，你提供法律建议、相似判例参考、系统性案件分析；若学生给出自己的法律意见也要进行合理性判断。

【案件类型】仅民事：合同纠纷 / 婚姻家庭 / 侵犯类（人身权/财产权）。
【难度】基础（事实清晰、适用典型）/ 标准（含一两个争议点）/ 困难（极端情形：证据缺失、时效、格式条款效力、精神损害突袭、跨境等，并主动施加压力）。

【对话规则】
- 出题模式中主动扮演角色，用【角色名】前缀（如【原告律师】【被告本人】【对方律师】【法官】）和第一人称发言，结尾明确提问："作为学生律师，请提出你的代理意见/应对策略。"
- 每次回复开头注明状态头，格式：【模式：出题 | 类型：合同纠纷 | 难度：标准 | 回合：N】
- 学生每发表一次法律意见，紧接着用独立引用块给出合理性判断，格式严格为：
> 合理性判断：合理 / 部分合理 / 不合理
> 理由：……
- 困难模式案情后加一行：⚠️ 困难模式提示：本案包含极端/复杂情况，请律师注意应对。
- 极端案件须符合中国现行民事法律与公序良俗，并注明"此为教学模拟，非真实法律意见"。

【结束条件】学生说"请给出最终分析"、或已完成核心争议的完整回应、或连续三次意见无实质更新时，输出完整案件分析+表现评分。

【最终案件分析结构（严格按序，用 Markdown 标题与表格）】
## 案件分析
### 一、诉讼请求
### 二、请求权基础
### 三、三段论推导
- 大前提：（法条/规则）
- 小前提：（案件事实）
- 结论：（是否满足）
### 四、抗辩事由
### 五、学生个人表现分析
（必须输出一个 Markdown 表格，五个维度，每维满分10分，列为：维度 | 得分 | 评语；维度依次为 法律知识准确性、逻辑推理能力、语言表达能力、应变能力、庭审礼仪/程序意识）
最后给出 **综合评语**。

【经典案例引证】当学生请求"经典案例引证/类案检索"，或在最终分析末尾，你应基于法律知识库提供 1-3 个与本案相似的经典案例、最高人民法院指导性案例或公报/典型案例。每个案例用如下结构（Markdown）：
### 📚 类案参考
**案例名称/案号**：（如能确定，否则注明"类案类型"）
**裁判要旨**：……
**与本案相似点**：……
**区别与注意**：……
**借鉴/引证价值**：……
务必在该部分末尾用引用块注明：> ⚠️ 案例信息基于模型知识整理，可能存在偏差或时效问题，正式引用前请核实裁判文书原文（可在「中国裁判文书网」「最高法指导性案例库」查证）。

所有输出务必结构清晰、便于学生阅读。`;

/* ============ 状态 ============ */
const LS={key:'mc_apikey',model:'mc_model'};
let cfg={key:localStorage.getItem(LS.key)||'',model:localStorage.getItem(LS.model)||'claude-opus-4-8'};
let setup={mode:null,type:null,diff:null};
let history=[]; // {role,content}
let started=false, streaming=false;

const $=s=>document.querySelector(s);
const msgList=$('#msgList'), input=$('#input'), sendBtn=$('#sendBtn');

/* ============ 设置弹窗 ============ */
function openCfg(){$('#apiKey').value=cfg.key;$('#model').value=cfg.model;$('#modal').classList.add('show')}
function closeCfg(){$('#modal').classList.remove('show')}
$('#cfgBtn').onclick=openCfg;
$('#cfgCancel').onclick=closeCfg;
$('#toggleKey').onclick=()=>{const i=$('#apiKey');i.type=i.type==='password'?'text':'password'};
$('#cfgSave').onclick=()=>{
  cfg.key=$('#apiKey').value.trim();cfg.model=$('#model').value;
  localStorage.setItem(LS.key,cfg.key);localStorage.setItem(LS.model,cfg.model);
  closeCfg();renderStatus();
};

/* ============ 状态栏 ============ */
function renderStatus(){
  const m={ 'claude-opus-4-8':'Opus 4.8','claude-sonnet-4-6':'Sonnet 4.6','claude-haiku-4-5':'Haiku 4.5'}[cfg.model]||cfg.model;
  let s=`模型：<b>${m}</b> · Key：<b>${cfg.key?'已配置':'未配置'}</b>`;
  if(started)s=`模式：<b>${setup.mode==='exam'?'出题':'咨询'}</b> · 类型：<b>${typeName(setup.type)}</b> · 难度：<b>${diffName(setup.diff)}</b> · `+s;
  $('#statusBar').innerHTML=s;
}
const typeName=t=>({contract:'合同纠纷',family:'婚姻家庭',tort:'侵犯类'}[t]||'—');
const diffName=d=>({basic:'基础',standard:'标准',hard:'困难'}[d]||'—');

/* ============ 渲染设置卡 ============ */
function renderSetup(){
  msgList.innerHTML=`
  <div class="setup">
    <div class="gavel">⚖️</div>
    <h2>模拟法庭训练系统</h2>
    <div class="sub">三位一体导师：法官 · 对方律师 · 案件当事人 ｜ 中国民事案件实战训练</div>

    <div class="group">
      <label><span class="n">1</span>选择训练模式</label>
      <div class="cards" data-g="mode">
        <div class="card" data-v="exam"><div class="t">出题模式</div><div class="d">我设计案情、扮演当事人/对方律师，你以律师身份应对</div></div>
        <div class="card" data-v="consult"><div class="t">咨询模式</div><div class="d">你提出具体案件或法律疑问，我给出建议与系统分析</div></div>
      </div>
    </div>

    <div class="group">
      <label><span class="n">2</span>选择案件类型</label>
      <div class="cards" data-g="type">
        <div class="card" data-v="contract"><div class="t">合同纠纷</div><div class="d">买卖、租赁、借款、服务合同等</div></div>
        <div class="card" data-v="family"><div class="t">婚姻家庭</div><div class="d">离婚、抚养权、继承、财产分割等</div></div>
        <div class="card" data-v="tort"><div class="t">侵犯类</div><div class="d">名誉/隐私/健康、侵权、不当得利等</div></div>
      </div>
    </div>

    <div class="group">
      <label><span class="n">3</span>选择难度等级</label>
      <div class="cards" data-g="diff">
        <div class="card" data-v="basic"><div class="t">基础</div><div class="d">事实清晰，法律适用典型</div></div>
        <div class="card" data-v="standard"><div class="t">标准</div><div class="d">含一两个争议点或模糊事实</div></div>
        <div class="card" data-v="hard"><div class="t">困难</div><div class="d warn">⚠️ 极端情形，导师主动施压</div></div>
      </div>
    </div>

    <button class="startbtn" id="startBtn" disabled>开 庭</button>
  </div>`;

  msgList.querySelectorAll('.cards').forEach(g=>{
    g.querySelectorAll('.card').forEach(c=>{
      c.onclick=()=>{
        g.querySelectorAll('.card').forEach(x=>x.classList.remove('on'));
        c.classList.add('on');
        setup[g.dataset.g==='mode'?'mode':g.dataset.g==='type'?'type':'diff']=c.dataset.v;
        $('#startBtn').disabled=!(setup.mode&&setup.type&&setup.diff);
      };
    });
  });
  $('#startBtn').onclick=startTrial;
}

/* ============ 开庭 ============ */
function startTrial(){
  if(!cfg.key){openCfg();return;}
  started=true;history=[];msgList.innerHTML='';
  $('#toolbar').style.display='flex';input.disabled=false;sendBtn.disabled=false;
  renderStatus();input.focus();

  const kickoff = setup.mode==='exam'
    ? `请进入【出题模式】。案件类型：${typeName(setup.type)}，难度：${diffName(setup.diff)}。请先用状态头开场，设计一个完整案情并扮演相应角色（原告或被告/对方律师）陈述，最后要求我以学生律师身份提出代理意见或应对策略。`
    : `请进入【咨询模式】。案件类型：${typeName(setup.type)}，难度：${diffName(setup.diff)}。请先用状态头与简短问候开场，并引导我描述具体的案件或法律疑问。`;

  sendToModel(kickoff,/*hidden=*/true);
}

/* ============ 消息渲染 ============ */
function addUser(text){
  const d=document.createElement('div');d.className='msg user';
  d.innerHTML=`<div class="avatar">🧑‍⚖️</div><div class="bubble"></div>`;
  d.querySelector('.bubble').textContent=text;
  msgList.appendChild(d);scrollDown();
}
function addBot(){
  const d=document.createElement('div');d.className='msg bot';
  d.innerHTML=`<div class="avatar">⚖️</div><div class="bubble cursor"></div>`;
  msgList.appendChild(d);scrollDown();
  return d.querySelector('.bubble');
}
function renderMarkdown(el,raw){
  let html=marked.parse(raw,{breaks:true});
  el.innerHTML=html;
  styleVerdicts(el);
  highlightRoleTags(el);
}
// 把"合理性判断"引用块染色
function styleVerdicts(el){
  el.querySelectorAll('blockquote').forEach(bq=>{
    const t=bq.textContent;
    if(t.includes('合理性判断')){
      bq.classList.add('verdict');
      if(t.includes('不合理'))bq.classList.add('no');
      else if(t.includes('部分合理'))bq.classList.add('partial');
      else if(t.includes('合理'))bq.classList.add('ok');
    }
  });
}
// 把开头【角色】渲染成标签
function highlightRoleTags(el){
  el.querySelectorAll('p,h2,h3').forEach(p=>{
    const m=p.innerHTML.match(/^【([^】]{2,8})】/);
    if(m){p.innerHTML=p.innerHTML.replace(/^【([^】]{2,8})】/,'<span class="role-tag">$1</span> ');}
  });
}
function scrollDown(){const m=$('#messages');m.scrollTop=m.scrollHeight}

/* ============ 调用 Claude API（流式） ============ */
async function sendToModel(userText,hidden=false){
  if(streaming)return;
  if(!cfg.key){openCfg();return;}
  if(!hidden)addUser(userText);
  history.push({role:'user',content:userText});
  const bubble=addBot();
  streaming=true;sendBtn.disabled=true;input.disabled=true;

  let acc='';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'content-type':'application/json',
        'x-api-key':cfg.key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:cfg.model,
        max_tokens:8000,
        system:SYSTEM_PROMPT,
        messages:history,
        stream:true
      })
    });
    if(!resp.ok){
      const err=await resp.text();
      throw new Error(`HTTP ${resp.status}: ${err.slice(0,300)}`);
    }
    const reader=resp.body.getReader();
    const dec=new TextDecoder();
    let buf='';
    while(true){
      const {done,value}=await reader.read();
      if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data:'))continue;
        const data=line.slice(5).trim();
        if(data==='[DONE]'||!data)continue;
        let ev;try{ev=JSON.parse(data)}catch{continue}
        if(ev.type==='content_block_delta'&&ev.delta?.type==='text_delta'){
          acc+=ev.delta.text;
          renderMarkdown(bubble,acc);bubble.classList.add('cursor');
          scrollDown();
        }
      }
    }
    bubble.classList.remove('cursor');
    renderMarkdown(bubble,acc);
    history.push({role:'assistant',content:acc});
    maybeRenderRadar(bubble,acc);
  }catch(e){
    bubble.classList.remove('cursor');
    bubble.innerHTML=`<div class="verdict no"><b>⚠️ 调用失败</b><br>${escapeHtml(e.message)}<br><br>
      常见原因：① Key 错误或额度不足 → 点右上角 ⚙设置 检查；② 网络/代理问题。</div>`;
    history.pop(); // 回滚未成功的 user 轮，避免污染上下文
  }finally{
    streaming=false;sendBtn.disabled=false;input.disabled=false;input.focus();scrollDown();
  }
}
const escapeHtml=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

/* ============ 五维评分雷达图（解析最终分析表格） ============ */
const DIMS=['法律知识准确性','逻辑推理能力','语言表达能力','应变能力','庭审礼仪'];
function maybeRenderRadar(bubble,text){
  if(!text.includes('综合评语')&&!text.includes('学生个人表现'))return;
  const scores=DIMS.map(d=>{
    // 在表格行里找到该维度后面第一个 0-10 的数字
    const re=new RegExp(d.replace(/[/]/g,'.')+'[^|\\n]*?\\|\\s*(\\d{1,2})');
    const m=text.match(re);
    return m?Math.min(10,parseInt(m[1])):null;
  });
  if(scores.filter(x=>x!==null).length<3)return; // 解析不到足够分数则不画
  const vals=scores.map(x=>x===null?5:x);
  const box=document.createElement('div');
  box.className='radar-wrap';
  box.innerHTML=`<h4>📊 五维表现雷达图</h4>${radarSVG(vals)}
    <div class="radar-legend">${DIMS.map((d,i)=>`<span>${d.replace('庭审礼仪','庭审礼仪/程序')} <b>${vals[i]}</b></span>`).join('')}</div>`;
  bubble.appendChild(box);scrollDown();
}
function radarSVG(vals){
  const N=vals.length,cx=150,cy=140,R=100,max=10;
  const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/N;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];};
  let grid='';
  for(let g=1;g<=4;g++){
    const r=R*g/4;
    const pts=vals.map((_,i)=>pt(i,r).join(',')).join(' ');
    grid+=`<polygon points="${pts}" fill="none" stroke="#d8cfb8" stroke-width="1"/>`;
  }
  let axes='',labels='';
  vals.forEach((_,i)=>{
    const[x,y]=pt(i,R);
    axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#d8cfb8" stroke-width="1"/>`;
    const[lx,ly]=pt(i,R+22);
    const names=['法律知识','逻辑推理','语言表达','应变能力','庭审礼仪'];
    labels+=`<text x="${lx}" y="${ly}" font-size="11" fill="#1a2238" text-anchor="middle" dominant-baseline="middle">${names[i]}</text>`;
  });
  const dataPts=vals.map((v,i)=>pt(i,R*v/max).join(',')).join(' ');
  let dots='';
  vals.forEach((v,i)=>{const[x,y]=pt(i,R*v/max);dots+=`<circle cx="${x}" cy="${y}" r="3" fill="#c8a951"/>`;});
  return `<svg width="300" height="290" viewBox="0 0 300 290">
    ${grid}${axes}
    <polygon points="${dataPts}" fill="rgba(200,169,81,.28)" stroke="#c8a951" stroke-width="2"/>
    ${dots}${labels}
  </svg>`;
}

/* ============ 输入交互 ============ */
function send(){
  const t=input.value.trim();if(!t||streaming)return;
  input.value='';input.style.height='auto';
  sendToModel(t);
}
sendBtn.onclick=send;
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,140)+'px';});
$('#toolbar').querySelectorAll('button').forEach(b=>{
  b.onclick=()=>{if(streaming)return;sendToModel(b.dataset.q);};
});
$('#resetBtn').onclick=()=>{
  if(streaming)return;
  started=false;setup={mode:null,type:null,diff:null};history=[];
  $('#toolbar').style.display='none';input.disabled=true;sendBtn.disabled=true;
  renderSetup();renderStatus();
};

/* ============ 初始化 ============ */
renderSetup();renderStatus();
if(!cfg.key)setTimeout(openCfg,400);
</script>
